baseurl = "/"
languageCode = "en"
title = "CFEngine Build"
theme = "cfbs-theme"

enableRobotsTXT = true
syntaxCSS = true

# Number of posts per page
[pagination]
pagerSize = 10

[params.info]
homeTitle = "CFEngine Build" # Title for home page

[params.featured]
modules = ['packages-allowlist-snapshot', 'delete-files', 'promise-type-docker-compose']

[taxonomies]
tag = "tags"
author = "author"

[params.sitemap]
baseUrl = "https://build.cfengine.com"
[markup]
	[markup.highlight]
		noClasses = false

# Hugo 0.162+ blocks text/html content files by default
# so explicitly allow the content media types we use
[security]
allowContent = ['^text/(html|markdown|org)$']

[params.gitProviders.repositoryLinkTemplates]
"github.com"    = "%s/tree/%s/%s"
"gitlab.com"    = "%s/-/tree/%s/%s"
"bitbucket.org" = "%s/src/%s/%s"
"codeberg.org"  = "%s/src/commit/%s/%s"
